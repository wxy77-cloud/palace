<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成就星图 - 心灵宫殿</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/achievements.css">
</head>
<body class="page page-achievements">
  <!-- Starry Sky Background -->
  <div class="starry-sky"></div>

  <!-- Header -->
  <header class="page-header container" style="position:relative; z-index:10;">
    <a href="../index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      返回宫殿
    </a>
    <h1 class="page-title">⭐ 成就星图</h1>
  </header>

  <!-- Content -->
  <main class="page-content container">
    <section class="achievement-control-panel" aria-label="成就筛选">
      <div class="achievement-control-panel__group achievement-control-panel__group--search">
        <label class="achievement-control-panel__label" for="achievement-search">检索</label>
        <input type="search" id="achievement-search" class="achievement-control-panel__input" placeholder="成就名或描述" autocomplete="off">
      </div>
      <div class="achievement-control-panel__group">
        <label class="achievement-control-panel__label" for="achievement-filter-type">类型</label>
        <select id="achievement-filter-type" class="achievement-control-panel__select">
          <option value="">全部类型</option>
          <option value="life">生活</option>
          <option value="study">学习</option>
          <option value="creative">创作</option>
          <option value="social">社交</option>
          <option value="health">健康</option>
          <option value="game">游戏</option>
          <option value="travel">旅行</option>
          <option value="courage">勇气</option>
          <option value="habit">习惯</option>
          <option value="special">特殊事件</option>
        </select>
      </div>
      <div class="achievement-control-panel__group">
        <label class="achievement-control-panel__label" for="achievement-filter-rarity">稀有度</label>
        <select id="achievement-filter-rarity" class="achievement-control-panel__select">
          <option value="">全部稀有度</option>
          <option value="common">普通</option>
          <option value="rare">稀有</option>
          <option value="epic">史诗</option>
          <option value="legendary">传说</option>
          <option value="hidden">隐藏</option>
        </select>
      </div>
      <div class="achievement-control-panel__group">
        <label class="achievement-control-panel__label" for="achievement-sort">排序</label>
        <select id="achievement-sort" class="achievement-control-panel__select">
          <option value="date-desc">最近达成</option>
          <option value="points-desc">点数最高</option>
          <option value="rarity-desc">稀有度最高</option>
          <option value="title-asc">名称 A-Z</option>
        </select>
      </div>
    </section>

    <!-- Empty State -->
    <div id="achievements-empty" class="achievements-empty" style="display:none;">
      <div class="achievements-empty__icon">⭐</div>
      <p class="achievements-empty__text">暂无成就，点击右下角星星添加第一个里程碑</p>
    </div>
  </main>

  <!-- Stars Container -->
  <div id="stars-container" class="stars-container"></div>

  <!-- Floating Add Button -->
  <button id="floating-add-btn" class="floating-add-btn" title="添加成就">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 4L38 24L58 26L42 40L46 60L32 50L18 60L22 40L6 26L26 24L32 4Z" fill="currentColor"/>
    </svg>
  </button>

  <!-- Detail Modal -->
  <div id="achievement-modal" class="achievement-modal"></div>

  <!-- Add/Edit Modal -->
  <div id="add-modal" class="add-modal">
    <div class="add-modal__content">
      <button id="close-add-modal" class="add-modal__close">&times;</button>
      <h2 class="add-modal__title">记录成就</h2>

      <form id="achievement-form" class="achievement-form" autocomplete="off">
        <div class="form-row">
          <label class="form-label" for="achievement-title">成就名称</label>
          <input type="text" id="achievement-title" class="form-input" placeholder="请输入成就名称" required>
        </div>

        <div class="achievement-form__grid">
          <div class="form-row">
            <label class="form-label" for="achievement-type">成就类型</label>
            <select id="achievement-type" class="form-input achievement-form__select">
              <option value="life">生活</option>
              <option value="study">学习</option>
              <option value="creative">创作</option>
              <option value="social">社交</option>
              <option value="health">健康</option>
              <option value="game">游戏</option>
              <option value="travel">旅行</option>
              <option value="courage">勇气</option>
              <option value="habit">习惯</option>
              <option value="special">特殊事件</option>
            </select>
          </div>

          <div class="form-row">
            <label class="form-label" for="achievement-rarity">稀有度</label>
            <select id="achievement-rarity" class="form-input achievement-form__select">
              <option value="common">普通</option>
              <option value="rare">稀有</option>
              <option value="epic">史诗</option>
              <option value="legendary">传说</option>
              <option value="hidden">隐藏</option>
            </select>
          </div>

          <div class="form-row">
            <label class="form-label" for="achievement-points">成就点数</label>
            <input type="number" id="achievement-points" class="form-input" min="0" step="5" value="10">
          </div>

          <div class="form-row">
            <label class="form-label" for="achievement-date">达成日期</label>
            <input type="date" id="achievement-date" class="form-input">
          </div>
        </div>

        <div class="form-row">
          <label class="form-label" for="achievement-content">成就描述</label>
          <textarea id="achievement-content" class="form-textarea" placeholder="写下成就的描述和达成的感想..."></textarea>
        </div>

        <div class="achievement-form__actions">
          <button type="button" id="cancel-achievement" class="achievement-form__cancel">取消</button>
          <button type="submit" class="achievement-form__submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer" style="position:relative; z-index:10;">
    <p class="footer__text">～ 每颗星都是闪亮的我 ～</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseClient.js"></script>
  <script src="../js/achievements.js"></script>
</body>
</html>
