<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 心灵宫殿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="page">
  <header class="page-header container">
    <a href="../index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      返回宫殿
    </a>
    <h1 class="page-title">账号</h1>
  </header>

  <main class="page-content container">
    <section class="auth-card">
      <h2 class="auth-card__title">登录 / 注册</h2>
      <p class="auth-card__text">使用邮箱账号保存你的书籍、饮品、日常与成就记录。</p>

      <form id="auth-form" class="auth-form">
        <div class="form-row">
          <label class="form-label" for="auth-email">邮箱</label>
          <input id="auth-email" class="form-input" type="email" autocomplete="email" required>
        </div>
        <div class="form-row">
          <label class="form-label" for="auth-password">密码</label>
          <input id="auth-password" class="form-input" type="password" autocomplete="current-password" minlength="6" required>
        </div>
        <p id="auth-message" class="auth-message" role="status"></p>
        <div class="form-actions">
          <button id="signup-btn" class="cancel-btn" type="button">注册</button>
          <button id="signin-btn" class="submit-btn" type="submit">登录</button>
        </div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseClient.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
