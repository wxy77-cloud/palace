<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>银幕手记 - 心灵宫殿</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/movies.css">
</head>
<body class="page">
  <!-- Header -->
  <header class="page-header container">
    <a href="../index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      返回宫殿
    </a>
    <h1 class="page-title">🎞 银幕手记</h1>
  </header>

  <!-- Content -->
  <main class="page-content container">
    <p class="mb-3 stone-text">把光影里的心跳、台词与余味妥善收起，留给日后慢慢回看。</p>

    <!-- Input Section -->
    <section class="input-section">
      <button id="add-btn" class="add-btn">
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path d="M10 3v14M3 10h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        添加电影记录
      </button>

      <form id="input-form" class="input-form" autocomplete="off">
        <div class="form-row">
          <label class="form-label" for="movie-title">电影名称</label>
          <input type="text" id="movie-title" class="form-input" placeholder="请输入电影名称" required>
        </div>

        <div class="form-row">
          <label class="form-label" for="movie-crew">导演 / 主演</label>
          <input type="text" id="movie-crew" class="form-input" placeholder="例如：王家卫 / 梁朝伟、张曼玉">
        </div>

        <div class="form-row">
          <label class="form-label" for="movie-date">观影日期</label>
          <input type="date" id="movie-date" class="form-input">
        </div>

        <div class="form-row">
          <label class="form-label">评分</label>
          <div class="movie-star-rating" id="movie-star-rating" aria-label="电影评分">
            <button class="movie-star" type="button" data-value="1" aria-label="1星">★</button>
            <button class="movie-star" type="button" data-value="2" aria-label="2星">★</button>
            <button class="movie-star" type="button" data-value="3" aria-label="3星">★</button>
            <button class="movie-star" type="button" data-value="4" aria-label="4星">★</button>
            <button class="movie-star" type="button" data-value="5" aria-label="5星">★</button>
          </div>
          <input type="hidden" id="movie-rating" value="0">
        </div>

        <div class="form-row">
          <span class="form-label">标签</span>
          <div class="movie-tag-options" id="movie-tag-options" aria-label="常用标签">
            <button class="movie-tag-option" type="button" data-tag="剧情">剧情</button>
            <button class="movie-tag-option" type="button" data-tag="喜剧">喜剧</button>
            <button class="movie-tag-option" type="button" data-tag="爱情">爱情</button>
            <button class="movie-tag-option" type="button" data-tag="科幻">科幻</button>
            <button class="movie-tag-option" type="button" data-tag="悬疑">悬疑</button>
            <button class="movie-tag-option" type="button" data-tag="动画">动画</button>
            <button class="movie-tag-option" type="button" data-tag="纪录片">纪录片</button>
            <button class="movie-tag-option" type="button" data-tag="治愈">治愈</button>
          </div>
          <input type="text" id="movie-custom-tags" class="form-input" placeholder="也可以自己敲，用逗号或空格分隔">
        </div>

        <div class="form-row">
          <label class="form-label" for="movie-review">短评</label>
          <textarea id="movie-review" class="form-textarea" placeholder="写下观后短评、喜欢的台词或难忘镜头..."></textarea>
        </div>

        <div class="form-row">
          <label class="form-label" for="movie-companion">观影伙伴</label>
          <input type="text" id="movie-companion" class="form-input" placeholder="一个人、朋友、家人，或某个特别的人">
        </div>

        <div class="form-actions">
          <button type="button" id="cancel-form" class="cancel-btn">取消</button>
          <button type="submit" class="submit-btn">保存手记</button>
        </div>
      </form>
    </section>

    <!-- Entries Container -->
    <section id="entries-container">
      <div class="empty-state">
        <div class="empty-state__icon">🎞</div>
        <p class="empty-state__text">暂无记录，点击上方按钮添加第一部电影珍藏</p>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer__text">～ 银幕暗下，余味仍在心上 ～</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseClient.js"></script>
  <script src="../js/movies.js"></script>
</body>
</html>
