<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纸间行旅 - 心灵宫殿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/books.css">
</head>
<body class="page page-books">
  <header class="page-header container">
    <a href="../index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      返回宫殿
    </a>
    <h1 class="page-title">📚 纸间行旅</h1>
  </header>

  <main class="page-content container">
    <p class="mb-3 stone-text book-intro">每一本读过的书，都是一段被安放在木架上的远行。</p>

    <section class="input-section book-input-section">
      <button id="add-btn" class="add-btn book-add-btn">
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path d="M10 3v14M3 10h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        添一本入架
      </button>

      <form id="input-form" class="input-form book-form" autocomplete="off">
        <div class="book-form__header">
          <span class="book-form__eyebrow">藏书票</span>
          <h2 class="book-form__title">记录一本读过的书</h2>
        </div>

        <div class="book-form-grid">
          <div class="form-row">
            <label class="form-label" for="book-title">书名</label>
            <input type="text" id="book-title" class="form-input book-input" placeholder="请输入书名" required>
          </div>
          <div class="form-row">
            <label class="form-label" for="book-author">作者</label>
            <input type="text" id="book-author" class="form-input book-input" placeholder="请输入作者姓名">
          </div>
          <div class="form-row">
            <label class="form-label" for="book-type">书籍类型</label>
            <select id="book-type" class="form-input book-input book-select">
              <option value="">请选择类型</option>
              <option value="fiction">文学小说</option>
              <option value="fantasy">奇幻魔法</option>
              <option value="science">科幻探索</option>
              <option value="history">历史传记</option>
              <option value="philosophy">哲学思考</option>
              <option value="mystery">悬疑推理</option>
              <option value="self-help">自我成长</option>
              <option value="poetry">诗歌散文</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label" for="book-status">阅读状态</label>
            <select id="book-status" class="form-input book-input book-select">
              <option value="想读">想读</option>
              <option value="在读">在读</option>
              <option value="读完">读完</option>
              <option value="重读">重读</option>
              <option value="暂停">暂停</option>
              <option value="弃读">弃读</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label" for="book-start-date">开始日期</label>
            <input type="date" id="book-start-date" class="form-input book-input">
          </div>
          <div class="form-row">
            <label class="form-label" for="book-date">完成日期</label>
            <input type="date" id="book-date" class="form-input book-input">
          </div>
          <div class="form-row">
            <label class="form-label" for="book-publisher">出版社</label>
            <input type="text" id="book-publisher" class="form-input book-input" placeholder="出版社 / 版本">
          </div>
          <div class="form-row">
            <label class="form-label" for="book-source">来源</label>
            <input type="text" id="book-source" class="form-input book-input" placeholder="购入、借阅、电子书...">
          </div>
          <div class="form-row">
            <label class="form-label">评分</label>
            <div class="star-rating" id="star-rating" aria-label="评分">
              <button class="star" type="button" data-value="1" aria-label="1 星">★</button>
              <button class="star" type="button" data-value="2" aria-label="2 星">★</button>
              <button class="star" type="button" data-value="3" aria-label="3 星">★</button>
              <button class="star" type="button" data-value="4" aria-label="4 星">★</button>
              <button class="star" type="button" data-value="5" aria-label="5 星">★</button>
            </div>
            <input type="hidden" id="book-rating" value="0">
          </div>
        </div>

        <div class="form-row">
          <label class="form-label" for="book-tags">标签</label>
          <input type="text" id="book-tags" class="form-input book-input" placeholder="用逗号或空格分隔，例如 魔法 学院 温柔">
        </div>

        <div class="form-row">
          <label class="book-switch">
            <input type="checkbox" id="book-reread">
            <span class="book-switch__track"></span>
            <span class="book-switch__text">想重读</span>
          </label>
        </div>

        <div class="form-row">
          <label class="form-label" for="book-quote">摘录</label>
          <textarea id="book-quote" class="form-textarea book-textarea book-textarea--small" placeholder="摘下一句仍在发光的话..."></textarea>
        </div>

        <div class="form-row">
          <label class="form-label" for="book-review">书评</label>
          <textarea id="book-review" class="form-textarea book-textarea" placeholder="写下读后感、重读时想提醒自己的话..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="cancel-form" class="cancel-btn book-cancel-btn">取消</button>
          <button type="submit" class="submit-btn book-submit-btn">放入书架</button>
        </div>
      </form>
    </section>

    <section class="book-toolbar" aria-label="藏书筛选">
      <div class="book-toolbar__group">
        <label class="book-toolbar__label" for="book-search">检索</label>
        <input type="search" id="book-search" class="book-toolbar__input" placeholder="书名或作者" autocomplete="off">
      </div>
      <div class="book-toolbar__group">
        <label class="book-toolbar__label" for="book-filter-type">类型</label>
        <select id="book-filter-type" class="book-toolbar__select">
          <option value="">全部类型</option>
          <option value="fiction">文学小说</option>
          <option value="fantasy">奇幻魔法</option>
          <option value="science">科幻探索</option>
          <option value="history">历史传记</option>
          <option value="philosophy">哲学思考</option>
          <option value="mystery">悬疑推理</option>
          <option value="self-help">自我成长</option>
          <option value="poetry">诗歌散文</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="book-toolbar__group">
        <label class="book-toolbar__label" for="book-filter-rating">评分</label>
        <select id="book-filter-rating" class="book-toolbar__select">
          <option value="">全部评分</option>
          <option value="5">5 星</option>
          <option value="4">4 星及以上</option>
          <option value="3">3 星及以上</option>
          <option value="2">2 星及以上</option>
          <option value="1">1 星及以上</option>
        </select>
      </div>
      <div class="book-toolbar__group">
        <label class="book-toolbar__label" for="book-sort">排序</label>
        <select id="book-sort" class="book-toolbar__select">
          <option value="created-desc">最近入架</option>
          <option value="read-desc">完成日期</option>
          <option value="rating-desc">评分最高</option>
          <option value="title-asc">书名 A-Z</option>
        </select>
      </div>
    </section>

    <section id="entries-container">
      <div class="bookshelf-empty">
        <div class="bookshelf-empty__icon">📖</div>
        <p class="bookshelf-empty__text">书架暂时空着，添加第一本书吧。</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__text">✧ 每一页都曾把你带到远方 ✧</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseClient.js"></script>
  <script src="../js/books.js"></script>
</body>
</html>
